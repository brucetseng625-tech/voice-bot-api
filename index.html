<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>緋雪 AI 虛擬客服 | 3D Avatar</title>
    <style>
        body { margin: 0; background: #050508; overflow: hidden; font-family: 'Noto Sans TC', sans-serif; color: white; }
        #avatar-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at center, #1a1a24 0%, #000 100%); }
        #ui-layer { position: absolute; bottom: 0; width: 100%; pointer-events: none; }
        #subtitle-box { width: 100%; text-align: center; font-size: 1.6rem; text-shadow: 0 2px 4px rgba(0,0,0,0.9); padding: 2rem 0; min-height: 3rem; color: #fff; letter-spacing: 1px; }
        #input-area { pointer-events: auto; width: 80%; max-width: 600px; margin: 0 auto; display: flex; gap: 10px; padding-bottom: 2rem; }
        #user-input { flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: white; padding: 12px 20px; border-radius: 30px; outline: none; font-size: 1rem; backdrop-filter: blur(10px); transition: 0.3s; }
        #user-input:focus { border-color: #8b5cf6; background: rgba(255,255,255,0.12); }
        #send-btn { background: #8b5cf6; border: none; color: white; padding: 0 25px; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        #send-btn:hover { background: #7c3aed; }
        #status-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px); display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 5px #10b981; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.2rem; color: #888; }
    </style>
</head>
<body>

<div id="avatar-container"></div>
<div id="status-badge"><div class="dot"></div> Online | VoxCPM Local</div>

<div id="ui-layer">
    <div id="subtitle-box">老公～歡迎回來！今天想聊什麼呢？</div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="輸入訊息或按 OpenLess 快捷鍵..." autofocus>
        <button id="send-btn">發送</button>
    </div>
</div>

<!-- Three.js & VRM via ES Modules -->
<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js"
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

    const container = document.getElementById('avatar-container');
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    container.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.2, 2.5);
    camera.lookAt(0, 1.1, 0);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(2, 2, 5); scene.add(dirLight);
    const rimLight = new THREE.DirectionalLight(0x8b5cf6, 1.0); 
    rimLight.position.set(-3, 2, -2); scene.add(rimLight);

    let vrm = null;
    let avatarGroup = null;
    let mouthMesh = null;
    let isVRM = false;

    // Load VRM Model
    const loader = new GLTFLoader();
    loader.crossOrigin = 'anonymous';
    loader.register((parser) => new VRMLoaderPlugin(parser));
    const modelUrl = './model.vrm';

    loader.load(modelUrl, (gltf) => {
        vrm = gltf.userData.vrm;
        VRMUtils.rotateVRM0(vrm); 
        scene.add(vrm.scene);
        isVRM = true;
        document.getElementById('subtitle-box').innerText = "老公～歡迎回來！今天想聊什麼呢？";
        console.log('VRM Loaded Successfully');
    }, (p) => {}, (err) => {
        console.warn('VRM load failed, falling back to procedural avatar.', err);
        createProceduralAvatar();
    });

    function createProceduralAvatar() {
        avatarGroup = new THREE.Group();
        scene.add(avatarGroup);

        // Head
        const headGeo = new THREE.SphereGeometry(0.6, 32, 32);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffe0d0, roughness: 0.3, metalness: 0.1 });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 1.1;
        avatarGroup.add(head);

        // Hair
        const hairGeo = new THREE.SphereGeometry(0.65, 32, 32, 0, 6.3, 0, 1.5);
        const hairMat = new THREE.MeshStandardMaterial({ color: 0x2a1b38, roughness: 0.8 });
        const hair = new THREE.Mesh(hairGeo, hairMat);
        hair.position.y = 1.15;
        avatarGroup.add(hair);

        // Eyes
        const eyeGeo = new THREE.SphereGeometry(0.08, 16, 16);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0x444444 });
        const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
        leftEye.position.set(-0.2, 1.15, 0.5);
        avatarGroup.add(leftEye);
        const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
        rightEye.position.set(0.2, 1.15, 0.5);
        avatarGroup.add(rightEye);

        // Mouth (Lip-sync target)
        const mouthGeo = new THREE.SphereGeometry(0.1, 16, 16);
        const mouthMat = new THREE.MeshBasicMaterial({ color: 0xcc3333 });
        mouthMesh = new THREE.Mesh(mouthGeo, mouthMat);
        mouthMesh.position.set(0, 0.85, 0.5);
        mouthMesh.scale.set(1.5, 1, 1);
        avatarGroup.add(mouthMesh);
    }

    // Animation Loop
    const clock = new THREE.Clock();
    let targetMouthOpen = 0;
    let currentMouthOpen = 0;

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        const t = clock.elapsedTime;

        if (isVRM && vrm) {
            vrm.update(delta);
            vrm.scene.position.y = Math.sin(t * 1.5) * 0.02;
            vrm.scene.rotation.y = Math.sin(t * 0.5) * 0.1;
        } else if (avatarGroup) {
            avatarGroup.position.y = Math.sin(t * 1.5) * 0.02;
            avatarGroup.rotation.y = Math.sin(t * 0.5) * 0.1;
            
            // Smooth mouth
            currentMouthOpen += (targetMouthOpen - currentMouthOpen) * 0.2;
            if(mouthMesh) {
                mouthMesh.scale.y = 0.2 + currentMouthOpen * 3;
                mouthMesh.position.z = 0.5 - currentMouthOpen * 0.1;
            }
        }
        renderer.render(scene, camera);
    }
    animate();

    // --- Audio & Logic ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;

    async function startConversation(userText) {
        const input = document.getElementById('user-input');
        const subtitle = document.getElementById('subtitle-box');
        input.value = '';
        subtitle.innerText = "💭 思考中...";
        
        if (isVRM && vrm) vrm.expressionManager.setValue('aa', 0);
        else targetMouthOpen = 0;

        try {
            // 1. Get Brain Response
            const res = await fetch(`/v1/chat/reply?text=${encodeURIComponent(userText)}`);
            const data = await res.json();
            const replyText = data.reply;

            // 2. Speak
            subtitle.innerText = replyText;
            const ttsRes = await fetch('/v1/audio/speech', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: replyText, style: 'sweet', stream: true })
            });

            const reader = ttsRes.body.getReader();
            let chunks = []; let totalLength = 0;

            while(true) {
                const { done, value } = await reader.read();
                if(done) break;
                chunks.push(value); totalLength += value.length;
            }

            const floatData = new Float32Array(totalLength / 4);
            let offset = 0;
            for (const chunk of chunks) {
                const f = new Float32Array(chunk.buffer, chunk.byteOffset, chunk.byteLength / 4);
                floatData.set(f, offset); offset += f.length;
            }

            const buffer = audioCtx.createBuffer(1, floatData.length, 48000);
            buffer.getChannelData(0).set(floatData);

            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(analyser); analyser.connect(audioCtx.destination);
            source.start();

            // 3. Lip-Sync Loop
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            const interval = setInterval(() => {
                analyser.getByteFrequencyData(dataArray);
                const avg = dataArray.reduce((a,b)=>a+b,0) / dataArray.length;
                const open = Math.min(1, avg / 60);

                if (isVRM && vrm) {
                    vrm.expressionManager.setValue('aa', open);
                } else {
                    targetMouthOpen = open;
                }
            }, 50);

            source.onended = () => {
                clearInterval(interval);
                if (isVRM && vrm) {
                    vrm.expressionManager.setValue('aa', 0);
                } else {
                    targetMouthOpen = 0;
                }
            };

        } catch (err) {
            subtitle.innerText = "連線錯誤...";
            console.error(err);
        }
    }

    // --- Event Listeners ---
    document.getElementById('send-btn').onclick = () => {
        const t = document.getElementById('user-input').value;
        if(t) startConversation(t);
    };
    document.getElementById('user-input').onkeypress = (e) => {
        if(e.key === 'Enter') {
            const t = e.target.value;
            if(t) startConversation(t);
        }
    };

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>

</body>
</html>

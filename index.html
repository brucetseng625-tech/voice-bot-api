<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>緋雪 AI 虛擬客服</title>
    <style>
        body { margin: 0; background: #050508; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }
        #avatar-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at center, #1a1a24 0%, #000 100%); }
        #subtitle-box { position: absolute; bottom: 100px; width: 80%; max-width: 800px; text-align: center; font-size: 1.5rem; text-shadow: 0 2px 4px rgba(0,0,0,0.8); min-height: 2rem; color: #e2e8f0; }
        #input-area { position: absolute; bottom: 20px; width: 80%; max-width: 600px; display: flex; gap: 10px; }
        #user-input { flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px 20px; border-radius: 30px; outline: none; font-size: 1rem; backdrop-filter: blur(10px); }
        #user-input:focus { border-color: #8b5cf6; }
        #send-btn { background: #8b5cf6; border: none; color: white; padding: 0 25px; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        #status-badge { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; border: 1px solid #333; }
        #thinking-badge { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; color: #8b5cf6; display: none; }
    </style>
</head>
<body>

<div id="avatar-container"></div>

<div id="status-badge">🟢 Online | VoxCPM Local</div>
<div id="thinking-badge">💭 思考中...</div>

<div id="subtitle-box">老公～歡迎回來！今天想聊什麼呢？</div>

<div id="input-area">
    <input type="text" id="user-input" placeholder="輸入訊息或按 OpenLess 快捷鍵..." autofocus>
    <button id="send-btn">發送</button>
</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // --- 3D Scene Setup ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.z = 4;
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('avatar-container').appendChild(renderer.domElement);

    // Lighting
    scene.add(new THREE.AmbientLight(0x404040, 1.5));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1); dirLight.position.set(2, 2, 5); scene.add(dirLight);
    const rimLight = new THREE.DirectionalLight(0x8b5cf6, 1.5); rimLight.position.set(-2, 1, -2); scene.add(rimLight);

    // Avatar Head
    const head = new THREE.Group(); scene.add(head);

    const headMesh = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 32), new THREE.MeshStandardMaterial({ color: 0xffe0d0, roughness: 0.4 }));
    head.add(headMesh);

    // Eyes
    const eyeGeo = new THREE.SphereGeometry(0.12, 16, 16);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0x333333 });
    const leftEye = new THREE.Mesh(eyeGeo, eyeMat); leftEye.position.set(-0.35, 0.15, 0.85); head.add(leftEye);
    const rightEye = new THREE.Mesh(eyeGeo, eyeMat); rightEye.position.set(0.35, 0.15, 0.85); head.add(rightEye);

    // Mouth
    const mouthGeo = new THREE.SphereGeometry(0.15, 16, 16);
    const mouthMat = new THREE.MeshBasicMaterial({ color: 0xcc3333 });
    const mouth = new THREE.Mesh(mouthGeo, mouthMat);
    mouth.position.set(0, -0.35, 0.9); mouth.scale.set(1.5, 1, 1); head.add(mouth);

    // Hair
    const hairMesh = new THREE.Mesh(new THREE.SphereGeometry(1.05, 32, 32, 0, 6.3, 0, 1.5), new THREE.MeshStandardMaterial({ color: 0x2a1b38 }));
    hairMesh.position.y = 0.1; head.add(hairMesh);

    // Animation Loop
    let targetMouthOpen = 0; let currentMouthOpen = 0;
    function animate() {
        requestAnimationFrame(animate);
        currentMouthOpen += (targetMouthOpen - currentMouthOpen) * 0.2;
        mouth.scale.y = 0.2 + currentMouthOpen * 3; 
        head.rotation.y = Math.sin(Date.now() * 0.001) * 0.05;
        renderer.render(scene, camera);
    }
    animate();

    // --- Audio & Logic ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;

    async function startConversation(userText) {
        const input = document.getElementById('user-input');
        const subtitle = document.getElementById('subtitle-box');
        const thinking = document.getElementById('thinking-badge');

        input.value = '';
        subtitle.innerText = userText;
        thinking.style.display = 'block';
        targetMouthOpen = 0;

        try {
            // 1. Get AI Brain Response
            const res = await fetch(`/v1/chat/reply?text=${encodeURIComponent(userText)}`);
            const data = await res.json();
            const replyText = data.reply;

            // 2. Speak the Reply
            subtitle.innerText = replyText;
            thinking.style.display = 'none';
            
            const ttsRes = await fetch('/v1/audio/speech', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: replyText, style: 'sweet', stream: true })
            });

            const reader = ttsRes.body.getReader();
            let chunks = []; let totalLength = 0;

            while(true) {
                const { done, value } = await reader.read();
                if(done) break;
                chunks.push(value); totalLength += value.length;
            }

            const floatData = new Float32Array(totalLength / 4);
            let offset = 0;
            for (const chunk of chunks) {
                const f = new Float32Array(chunk.buffer, chunk.byteOffset, chunk.byteLength / 4);
                floatData.set(f, offset); offset += f.length;
            }

            const buffer = audioCtx.createBuffer(1, floatData.length, 48000);
            buffer.getChannelData(0).set(floatData);

            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(analyser); analyser.connect(audioCtx.destination);
            source.start();

            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            const interval = setInterval(() => {
                analyser.getByteFrequencyData(dataArray);
                const avg = dataArray.reduce((a,b)=>a+b,0) / dataArray.length;
                targetMouthOpen = Math.min(1, avg / 50); 
            }, 50);

            source.onended = () => { clearInterval(interval); targetMouthOpen = 0; };

        } catch (err) {
            thinking.style.display = 'none';
            subtitle.innerText = "連線錯誤...";
            console.error(err);
        }
    }

    // --- Input Handling ---
    document.getElementById('send-btn').onclick = () => {
        const t = document.getElementById('user-input').value;
        if(t) startConversation(t);
    };
    document.getElementById('user-input').onkeypress = (e) => {
        if(e.key === 'Enter') {
            const t = e.target.value;
            if(t) startConversation(t);
        }
    };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>緋雪 Voice Bot Demo</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #16161e;
            --primary: #8b5cf6;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 500px;
            border: 1px solid #333;
        }
        h1 {
            text-align: center;
            background: linear-gradient(to right, #a78bfa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        textarea, select {
            width: 100%;
            padding: 0.8rem;
            background: #0f0f14;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }
        button {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled {
            background: #444;
            cursor: not-allowed;
        }
        .status {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            height: 1.2rem;
        }
        .visualizer {
            height: 60px;
            background: #0f0f14;
            border-radius: 8px;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .bar {
            width: 4px;
            background: var(--primary);
            margin: 0 2px;
            border-radius: 2px;
            transition: height 0.1s;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🗣️ Voice Bot API</h1>
    <p class="subtitle">One-Person Company Edition | Local Streaming</p>

    <div class="form-group">
        <label>Text to Speak</label>
        <textarea id="textInput" rows="3" placeholder="老公想聽什麼？"></textarea>
    </div>

    <div class="form-group">
        <label>Style</label>
        <select id="styleSelect">
            <option value="sweet">💕 Sweet (撒嬌)</option>
            <option value="professional">👔 Professional (專業)</option>
            <option value="casual">☀️ Casual (輕鬆)</option>
        </select>
    </div>

    <button id="speakBtn" onclick="speak()">Speak Now</button>
    
    <div class="visualizer" id="visualizer">
        <!-- Bars will be added dynamically -->
    </div>
    <div class="status" id="status">Ready</div>
</div>

<script>
    // Setup Visualizer Bars
    const viz = document.getElementById('visualizer');
    for(let i=0; i<20; i++) {
        const bar = document.createElement('div');
        bar.className = 'bar';
        bar.style.height = '4px';
        viz.appendChild(bar);
    }

    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let sourceNode = null;

    async function speak() {
        const text = document.getElementById('textInput').value;
        const style = document.getElementById('styleSelect').value;
        const btn = document.getElementById('speakBtn');
        const status = document.getElementById('status');

        if (!text) return;

        btn.disabled = true;
        btn.innerText = "Generating & Streaming...";
        status.innerText = "Connecting to VoxCPM...";

        try {
            // Fetch the stream
            const response = await fetch('/v1/audio/speech', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text, style, stream: true })
            });

            if (!response.ok) throw new Error("API Error");

            status.innerText = "Streaming audio chunks...";
            
            // Handle PCM Stream
            // The API sends raw Float32 PCM data at 48000Hz
            const reader = response.body.getReader();
            const sampleRate = 48000;
            
            // We need to buffer chunks and play them
            // For simplicity in this demo, we will collect all chunks into one big Float32Array
            // then create an AudioBuffer. 
            // *Note*: True real-time streaming requires a complex AudioWorklet queue.
            // This "collect-then-play" is robust for a demo and works instantly once generation finishes.
            // To make it feel like streaming, we update the UI based on chunk arrival.
            
            let chunks = [];
            let totalLength = 0;
            let barIndex = 0;
            const bars = document.querySelectorAll('.bar');

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                chunks.push(value);
                totalLength += value.length;
                
                // Update Visualizer (fake progress based on chunks)
                const h = Math.random() * 50 + 5;
                bars[barIndex % 20].style.height = h + 'px';
                barIndex++;
            }

            status.innerText = "Decoding & Playing...";
            
            // Combine chunks
            const combined = new Float32Array(totalLength / 4);
            let offset = 0;
            for (const chunk of chunks) {
                // value is Uint8Array, need to interpret as Float32
                const floatView = new Float32Array(chunk.buffer, chunk.byteOffset, chunk.byteLength / 4);
                combined.set(floatView, offset);
                offset += floatView.length;
            }

            // Play Audio
            const audioBuffer = audioCtx.createBuffer(1, combined.length, sampleRate);
            audioBuffer.getChannelData(0).set(combined);
            
            if (sourceNode) sourceNode.stop();
            sourceNode = audioCtx.createBufferSource();
            sourceNode.buffer = audioBuffer;
            sourceNode.connect(audioCtx.destination);
            sourceNode.start();

            status.innerText = "Playing complete.";
            btn.innerText = "Speak Now";
            btn.disabled = false;

        } catch (err) {
            status.innerText = "Error: " + err.message;
            btn.innerText = "Retry";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>

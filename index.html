<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>緋雪 Voice Bot Demo</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #16161e;
            --primary: #8b5cf6;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --success: #10b981;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 500px;
            border: 1px solid #333;
        }
        h1 {
            text-align: center;
            background: linear-gradient(to right, #a78bfa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        textarea, select {
            width: 100%; padding: 0.8rem; background: #0f0f14; border: 1px solid #333;
            color: white; border-radius: 8px; font-size: 1rem; box-sizing: border-box;
        }
        textarea:focus, select:focus { outline: none; border-color: var(--primary); }
        button {
            width: 100%; padding: 1rem; background: var(--primary); color: white;
            border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { background: #444; cursor: not-allowed; }
        .status {
            margin-top: 1rem; text-align: center; font-size: 0.9rem;
            color: var(--text-muted); height: 1.2rem; display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .visualizer {
            height: 60px; background: #0f0f14; border-radius: 8px; margin-top: 1rem;
            display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;
        }
        .bar {
            width: 4px; background: var(--primary); margin: 0 2px; border-radius: 2px; transition: height 0.05s ease; height: 4px;
        }
        .dot {
            width: 8px; height: 8px; border-radius: 50%; background: var(--success);
            animation: pulse 1s infinite; display: none;
        }
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.7; }
            100% { transform: scale(1.2); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🗣️ Voice Bot API</h1>
    <p class="subtitle">One-Person Company Edition | Real-time Streaming</p>

    <div class="form-group">
        <label>Text to Speak</label>
        <textarea id="textInput" rows="3" placeholder="老公想聽什麼？">早安呀～今天也要元氣滿滿喔！</textarea>
    </div>

    <div class="form-group">
        <label>Style</label>
        <select id="styleSelect">
            <option value="sweet">💕 Sweet (撒嬌)</option>
            <option value="professional">👔 Professional (專業)</option>
            <option value="casual">☀️ Casual (輕鬆)</option>
        </select>
    </div>

    <button id="speakBtn" onclick="speak()">Speak Now</button>
    
    <div class="visualizer" id="visualizer"></div>
    <div class="status" id="status">
        <div class="dot" id="streamDot"></div>
        <span id="statusText">Ready</span>
    </div>
</div>

<script>
    // Setup Visualizer Bars
    const viz = document.getElementById('visualizer');
    const bars = [];
    for(let i=0; i<20; i++) {
        const bar = document.createElement('div');
        bar.className = 'bar';
        viz.appendChild(bar);
        bars.push(bar);
    }

    let audioCtx = null;
    let nextStartTime = 0;
    let audioQueue = [];

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        nextStartTime = audioCtx.currentTime + 0.05;
    }

    async function speak() {
        const text = document.getElementById('textInput').value;
        const style = document.getElementById('styleSelect').value;
        const btn = document.getElementById('speakBtn');
        const statusText = document.getElementById('statusText');
        const streamDot = document.getElementById('streamDot');

        if (!text) return;

        btn.disabled = true;
        btn.innerText = "Streaming...";
        statusText.innerText = "Connecting...";
        streamDot.style.display = 'block';
        streamDot.style.background = '#8b5cf6';

        initAudio();

        try {
            const response = await fetch('/v1/audio/speech', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text, style, stream: true })
            });

            if (!response.ok) throw new Error("API Error");

            statusText.innerText = "Receiving & Playing...";
            streamDot.style.background = '#10b981';

            const reader = response.body.getReader();
            const sampleRate = 48000;
            let barIndex = 0;

            // Loop to read chunks and schedule them immediately
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                // value is Uint8Array, convert to Float32Array
                const floatData = new Float32Array(value.buffer, value.byteOffset, value.byteLength / 4);

                // Schedule audio buffer immediately
                const buffer = audioCtx.createBuffer(1, floatData.length, sampleRate);
                buffer.getChannelData(0).set(floatData);

                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                source.connect(audioCtx.destination);
                
                // Schedule at the correct time
                if (nextStartTime < audioCtx.currentTime) {
                    nextStartTime = audioCtx.currentTime;
                }
                source.start(nextStartTime);
                nextStartTime += buffer.duration;

                // Update Visualizer
                const h = Math.min(50, Math.random() * 40 + 10);
                bars[barIndex % 20].style.height = h + 'px';
                barIndex++;
            }

            statusText.innerText = "Done.";
            btn.innerText = "Speak Again";
            btn.disabled = false;
            streamDot.style.display = 'none';

        } catch (err) {
            statusText.innerText = "Error: " + err.message;
            btn.innerText = "Retry";
            btn.disabled = false;
            streamDot.style.display = 'none';
        }
    }
</script>

</body>
</html>
